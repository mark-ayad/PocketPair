# nginx site config for PocketPair.
#
# The rate-limit zone must live in the http {} block (e.g. /etc/nginx/nginx.conf),
# NOT here. Add this line there once:
#
#     limit_req_zone $binary_remote_addr zone=pp_api:10m rate=10r/s;
#
# Then enable this site (symlink into sites-enabled), test, and reload nginx.

server {
    listen 80;
    server_name your-domain.com;

    # Repo checkout on the server.
    root /opt/pocketpair;

    # Static assets served directly by nginx for speed.
    location /js/      { try_files $uri =404; }
    location /styles/  { try_files $uri =404; }

    # API proxied to gunicorn (bound locally by the systemd unit).
    location /api/ {
        limit_req zone=pp_api burst=20 nodelay;
        proxy_pass http://127.0.0.1:8000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # Everything else falls back to the single-page entry point.
    location / {
        try_files $uri /index.html;
    }

    # TLS is added by certbot (it rewrites this file to listen on 443 and
    # redirect 80 -> 443). See DEPLOY.md.
}
